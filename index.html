<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOS Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="setupScreen" class="card setup-screen">
      <h1>SOS Game</h1>
      <p>Create a shared game for 2, 3, or 4 players.</p>
      <label>Board size</label>
      <input id="setupBoardSize" type="number" min="3" max="30" value="10" />
      <label>Number of players</label>
      <select id="setupPlayerCount">
        <option value="2">2 players</option>
        <option value="3">3 players</option>
        <option value="4">4 players</option>
      </select>
      <button id="createRoomBtn" class="primary">Create online game link</button>
      <p id="setupStatus" class="status"></p>
    </section>

    <section id="gameScreen" class="hidden">
      <header class="topbar card">
        <div>
          <h1>SOS</h1>
          <p id="playerStatus">Loading...</p>
        </div>
        <div class="controls">
          <button id="letterS" class="letter selected">S</button>
          <button id="letterO" class="letter">O</button>
          <div class="pill">Turn <strong id="turnLabel">-</strong></div>
          <div id="scoreWrap" class="scores"></div>
          <button id="copyLinkBtn">Copy link</button>
          <button id="newGameBtn">New game</button>
        </div>
      </header>

      <section class="card board-card">
        <div class="board-head">
          <h2 id="boardTitle">Board</h2>
          <p id="deviceLabel"></p>
        </div>
        <p id="message" class="message hidden"></p>
        <p id="debug" class="debug hidden"></p>
        <div id="roomLinkBox" class="room-link hidden"></div>
        <div id="board" class="board"></div>
      </section>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
